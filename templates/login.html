{% extends "base.html" %}

{% block content %}
<form method="POST">
    {% csrf_token %}
    <input type="text" placeholder="Enter your username..."
    name="username">

    <input type="password" placeholder="Enter your password..."
    name="password">
    <button type="submit">Login</button>
    <p>
        Don't have an account? <a href="{% url "register" %}">Sign up</a>
    </p>
{% endblock content %}
